skill_id: hard_brake
family: vehicle_interaction
implemented: true
trigger:
  description: A vehicle pair is longitudinally aligned on the same or successor lane.
  minimum_history_steps: 30
  following_distance_m: {min: 8.0, max: 45.0}
  required_map_relation: same_or_successor_lane
actors:
  initiator_types: [vehicle]
  responder_types: [vehicle]
  generated_roles: [initiator, responder]
parameters:
  brake_onset_s: {min: 0.5, max: 2.5}
  peak_deceleration_mps2: {min: 2.0, max: 6.0}
  braking_duration_s: {min: 0.8, max: 3.0}
constraints:
  remain_in_drivable_area: true
  preserve_lane_direction: true
  nonnegative_speed: true
  forbid_unavoidable_collision: true
risk_definition:
  metric: time_to_collision
  target_range_s: [1.0, 4.0]
expected_behavior: [brake, maintain_control, avoid_collision]
output_labels: [skill_id, leader_track_id, follower_track_id, peak_deceleration_mps2, risk_level, expected_behavior]
