skill_id: vulnerable_crossing
family: vulnerable_road_user
implemented: true
trigger:
  description: A pedestrian or cyclist is close enough to cross the responder's lane within the prediction horizon.
  minimum_history_steps: 20
  maximum_distance_to_lane_m: 12.0
  required_map_relation: intersects_or_approaches_drivable_area
actors:
  initiator_types: [pedestrian, cyclist]
  responder_types: [vehicle]
  generated_roles: [initiator, responder]
parameters:
  crossing_start_s: {min: 0.5, max: 3.0}
  crossing_angle_deg: {min: 60.0, max: 120.0}
  pedestrian_speed_mps: {min: 0.8, max: 2.2}
  cyclist_speed_mps: {min: 2.0, max: 7.0}
constraints:
  continuous_crossing_motion: true
  class_specific_speed_limit: true
  responder_remains_in_drivable_area: true
  forbid_unavoidable_collision: true
risk_definition:
  metric: post_encroachment_time
  target_range_s: [0.5, 4.0]
expected_behavior: [yield, decelerate, stop_if_needed]
output_labels: [skill_id, vulnerable_track_id, responder_track_id, crossing_start_s, risk_level, expected_behavior]
