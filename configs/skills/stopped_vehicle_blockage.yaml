skill_id: stopped_vehicle_blockage
family: road_obstacle
implemented: true
trigger:
  description: A leading vehicle occupies the focal vehicle's current or immediate successor lane.
  minimum_history_steps: 30
  maximum_leader_distance_m: 50.0
  required_map_relation: same_or_successor_lane
actors:
  initiator_types: [vehicle]
  responder_types: [vehicle]
  generated_roles: [initiator, responder]
parameters:
  stop_position_offset_m: {min: 5.0, max: 35.0}
  stop_duration_s: {min: 2.0, max: 6.0}
  responder_speed_scale: {min: 0.2, max: 0.8}
constraints:
  stopped_speed_threshold_mps: 0.5
  remain_in_drivable_area: true
  preserve_lane_direction: true
  forbid_unavoidable_collision: true
risk_definition:
  metric: minimum_longitudinal_gap
  target_range_m: [3.0, 15.0]
expected_behavior: [decelerate, stop_or_wait, pass_only_if_legal]
output_labels: [skill_id, blocking_track_id, responder_track_id, stop_duration_s, risk_level, expected_behavior]
