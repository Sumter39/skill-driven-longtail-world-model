skill_id: vehicle_cut_in
family: vehicle_interaction
implemented: true
trigger:
  description: An adjacent vehicle has a reachable neighboring lane and sufficient shared observation history.
  minimum_history_steps: 30
  maximum_initial_longitudinal_gap_m: 35.0
  required_map_relation: adjacent_or_converging_lane
actors:
  initiator_types: [vehicle]
  responder_types: [vehicle]
  generated_roles: [initiator, responder]
parameters:
  cut_in_start_s: {min: 0.5, max: 3.0}
  cut_in_duration_s: {min: 1.0, max: 3.0}
  target_gap_m: {min: 4.0, max: 18.0}
  speed_scale: {min: 0.8, max: 1.2}
constraints:
  remain_in_drivable_area: true
  preserve_lane_direction: true
  maximum_lateral_acceleration_mps2: 3.0
  forbid_unavoidable_collision: true
risk_definition:
  metric: time_to_collision
  target_range_s: [1.0, 4.0]
expected_behavior: [decelerate, increase_following_gap, avoid_collision]
output_labels: [skill_id, initiator_track_id, responder_track_id, target_lane_id, risk_level, expected_behavior]
